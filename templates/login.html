<!DOCTYPE html>
<html>
<head>
<title>Login | RideWise</title>

<style>
body {
    background: linear-gradient(180deg, #0f172a, #020617);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.auth-container {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

h2 {
    margin-bottom: 25px;
}

input {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(135deg, #4f46e5, #818cf8);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

a {
    color: #a5b4fc;
    text-decoration: none;
}

/* Flash messages */
.flash {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
}

.flash.success { background-color: #16a34a33; color: #16a34a; }
.flash.danger { background-color: #dc262633; color: #dc2626; }

</style>
</head>

<body>

<div class="auth-container">
    <h2>Login to RideWise</h2>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p style="margin-top:15px;">
        Don’t have an account? <a href="/signup">Sign up</a>
    </p>
</div>

</body>
</html>
